services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://marketplace:marketplace@db:5432/marketplace?schema=public
      PORT: "4000"
      NODE_ENV: production
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      MP_DEV: ${MP_DEV:-true}
      MP_APP_ID: ${MP_APP_ID:-}
      MP_CLIENT_SECRET: ${MP_CLIENT_SECRET:-}
      MP_ACCESS_TOKEN_TEST: ${MP_ACCESS_TOKEN_TEST:-}
      MP_ACCESS_TOKEN_PROD: ${MP_ACCESS_TOKEN_PROD:-}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-http://localhost:4000}
      NEXT_PUBLIC_MP_PUBLIC_KEY: ${NEXT_PUBLIC_MP_PUBLIC_KEY:-}
    ports:
      - "3000:3000"

volumes:
  pgdata:
